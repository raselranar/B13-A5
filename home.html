<!doctype html>
<html lang="en" class="overflow-y-scroll">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind and Daisy CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="">
    <!-- header -->
    <header class="shadow sticky top-0 bg-base-100 z-10">
      <!-- nav bar -->
      <nav
        class="flex flex-col gap-2.5 sm:flex-row sm:container py-4 sm:items-center justify-between mx-3 sm:mx-auto"
      >
        <!-- logo -->
        <div class="flex gap-2 items-center">
          <img class="w-8" src="./assets/github-logo.png" alt="github-logo" />
          <h1 class="">GitHub Issues Tracker</h1>
        </div>

        <!-- right side -->
        <div class="flex gap-4 flex-wrap">
          <!--search bar  -->
          <div class="">
            <label class="input">
              <i
                class="fa-brands fa-sistrix"
                style="color: rgb(116, 120, 127)"
              ></i>
              <input
                id="search-input"
                type="search"
                required
                placeholder="Search"
              />
            </label>
          </div>
          <!-- new issue button -->
          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </nav>
    </header>
    <!-- main section -->
    <main class="sm:w-10/12 mt-15 mx-3 sm:mx-auto">
      <!-- tab buttons -->
      <section class="p-6 rounded-lg border-gray-200 border">
        <div id="tab-buttons" class="flex gap-2.5 flex-wrap">
          <button
            data-id="all"
            class="btn text-gray-500 btn-primary text-white w-28"
          >
            All
          </button>
          <button data-id="open" class="btn text-gray-500 w-28">Open</button>
          <button data-id="closed" class="btn text-gray-500 w-28">
            Closed
          </button>
        </div>
      </section>

      <!-- issue section -->
      <section class="mt-4 rounded-lg border-gray-200 border">
        <!-- issue counter and status -->
        <div
          class="p-4 flex flex-wrap items-center gap-3 justify-between shadow"
        >
          <!-- total issues -->
          <div class="flex items-center gap-4.25">
            <img src="./assets/Aperture.png" alt="Aperture icon" />
            <div class="">
              <h2 class="font-semibold text-xl text-[#1F2937]">
                <span id="total-issues-show">50</span> Issues
              </h2>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <!-- right side -->
          <div class="flex gap-4">
            <div>
              <div
                class="mr-1.25 rounded-full bg-[#00A96E] w-3 h-3 inline-block"
              ></div>
              Open
            </div>
            <div>
              <div
                class="mr-1.25 rounded-full bg-[#A855F7] w-3 h-3 inline-block"
              ></div>
              Closed
            </div>
          </div>
        </div>

        <!-- card/issue container -->
        <div
          id="card-container"
          class="p-4 grid grid-cols-1 xl:grid-cols-4 lg:grid-cols-3 md:grid-cols-2 gap-3"
        ></div>
        <!-- loading -->
        <div
          id="card-loading"
          class="h-[50vh] flex justify-center items-center hidden"
        >
          <span class="loading loading-dots loading-xl"></span>
        </div>
      </section>
    </main>
    <!-- modal -->
    <dialog id="card-info-modal" class="modal"></dialog>
  </body>
  <script src="script.js"></script>
</html>
