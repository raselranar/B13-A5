<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind and Daisy CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="">
    <!-- login form -->
    <!-- container -->
    <section class="flex flex-col justify-center items-center h-screen">
      <div class="bg-base-200 border-base-300 rounded-box border p-4">
        <!-- heading -->
        <div class="flex flex-col items-center justify-center gap-6 mb-6">
          <img src="./assets/github-logo.png" alt="github-logo" />
          <div class="text-center">
            <h1 class="font-bold text-2xl leading-7.25">
              GitHub Issues Tracker
            </h1>
            <h2 class="text-gray-500 mt-1">Sign in to manage your issues</h2>
          </div>
        </div>
        <fieldset class="fieldset">
          <label class="label font-medium text-base text-[#1F2937]"
            >Username</label
          >
          <input
            type="text"
            class="input rounded-lg"
            placeholder="Enter Username"
          />
          <p class="text-primary text-sm">Default: admin</p>

          <label class="label font-medium text-base text-[#1F2937] mt-2"
            >Password</label
          >
          <input
            type="password"
            class="input rounded-lg"
            placeholder="Enter Password"
          />
          <p class="text-primary text-sm">Default: admin123</p>

          <button class="btn btn-primary mt-4">Sign In</button>
        </fieldset>

        <div
          class="flex mt-6 items-center before:flex-1 before:border-t before:border-gray-300 before:mr-2 after:flex-1 after:border-t after:border-gray-300 after:ml-2"
        >
          OR
        </div>
        <div class="mt-6">
          <p class="text-gray-500 text-center">Demo Credentials:</p>
          <div class="mt-7.5 text-center">
            <p class=""><span class="font-semibold">Username: </span>admin</p>
            <p class="">
              <span class="font-semibold">Password: </span> admin123
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
